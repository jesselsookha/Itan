  - Part Ⅱ — Identity:
    - identity/index.md
    - Your Narrative Anchor: identity/01-narrative-anchor.md
    - Writing Your Bio and Positioning: identity/02-bio-and-positioning.md
    - Identity Across Platforms: identity/03-identity-across-platforms.md

  - Part Ⅲ — Curation:
