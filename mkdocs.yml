site_name: Itan
site_description: >
  A portfolio development framework for students and emerging professionals.
  Build your story. Make your work visible. Let it last beyond graduation.
site_author: Jessel Sookha
site_url: https://jesselsookha.github.io/Itan/

repo_name: jesselsookha/Itan
repo_url: https://github.com/jesselsookha/Itan
edit_uri: ""

copyright: >
  Itan — developed by Jessel Sookha.
  Open for use, adaptation, and sharing.

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  # custom_dir: overrides        # Uncomment when custom overrides are added

  palette:
    # Light mode (default)
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter           # Replace with preferred Google Font after content phase
    code: JetBrains Mono  # Clean monospace for any code snippets

  features:
    - navigation.tabs           # Top-level sections as tabs
    - navigation.tabs.sticky    # Tabs remain visible on scroll
    - navigation.sections       # Expand sections in left nav
    - navigation.indexes        # Section index pages (Part landing pages)
    - navigation.top            # Back-to-top button
    - navigation.footer         # Previous / Next navigation at page bottom
    - search.highlight          # Highlight search terms on result pages
    - search.suggest            # Search autocomplete
    - content.tooltips          # Hover tooltips on abbreviations
    - toc.follow                # Table of contents follows scroll

  icon:
    repo: fontawesome/brands/github

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

# ---------------------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition                  # Note / tip / warning callout blocks
  - pymdownx.details            # Collapsible admonition blocks
  - pymdownx.superfences        # Fenced code blocks with language support
  - pymdownx.tabbed:
      alternate_style: true     # Tabbed content blocks
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list                   # Add attributes to elements
  - md_in_html                  # Markdown inside HTML blocks
  - toc:
      permalink: true           # Anchor links on headings
      title: On this page
  - tables
  - footnotes

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md

  - Part Ⅰ — Foundations:
